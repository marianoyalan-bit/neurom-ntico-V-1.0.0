name: One-time Debug APK build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK and remove workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon -x lint || ./gradlew :app:assembleDebug --no-daemon -x lint

      - name: List APKs
        run: |
          echo "Looking for APKs..."
          find . -type f -name "*.apk" -print || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuromantico-apk
          path: '**/*.apk'

      - name: Remove this workflow (one-time run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f .github/workflows/android-build-once.yml ]; then
            git rm .github/workflows/android-build-once.yml || true
            git commit -m "ci: remove one-time build workflow after run" || true
            git push origin HEAD:main || true
          else
            echo "Workflow file not found, nothing to remove."
          fi
          
